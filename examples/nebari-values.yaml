# examples/nebari-values.yaml
# Example values for deploying nebari-superset on a Nebari cluster.
#
# Prerequisites:
#   - Nebari cluster with nebari-operator installed
#   - Keycloak realm "nebari" configured
#   - Target namespace labeled: kubectl label namespace superset nebari.dev/managed=true
#
# Usage:
#   helm upgrade --install superset nebari-superset/nebari-superset \
#     -f nebari-values.yaml -n superset --create-namespace

# -- Enable NebariApp CRD for routing and gateway auth
nebariapp:
  enabled: true
  hostname: superset.nebari.example.com  # CHANGE ME
  auth:
    enabled: true
    provisionClient: true
    scopes:
      - openid
      - profile
      - email
  gateway: public

superset:
  # -- OAuth configuration for Keycloak RBAC
  configOverrides:
    proxy_fix: |
      ENABLE_PROXY_FIX = True
      PROXY_FIX_CONFIG = {
          'x_for': 1,
          'x_proto': 1,
          'x_host': 1,
          'x_port': 1,
          'x_prefix': 1,
      }
      WTF_CSRF_ENABLED = True
      WTF_CSRF_TIME_LIMIT = None
      FEATURE_FLAGS = {
          "DYNAMIC_PLUGINS": True,
      }

    oauth_config: |
      import os
      import logging
      from flask_appbuilder.security.manager import AUTH_OAUTH
      from superset.security import SupersetSecurityManager

      logger = logging.getLogger(__name__)

      class CustomSecurityManager(SupersetSecurityManager):
          def oauth_user_info(self, provider, response=None):
              if provider == 'keycloak':
                  me = self.appbuilder.sm.oauth_remotes[provider].userinfo()
                  roles = me.get('roles', me.get('groups', []))
                  logger.info(f"Keycloak userinfo: {me}")
                  return {
                      'username': me.get('preferred_username', ''),
                      'first_name': me.get('given_name', ''),
                      'last_name': me.get('family_name', ''),
                      'email': me.get('email', ''),
                      'role_keys': roles,
                  }
              return super().oauth_user_info(provider, response)

      CUSTOM_SECURITY_MANAGER = CustomSecurityManager
      AUTH_TYPE = AUTH_OAUTH
      OAUTH_PROVIDERS = [
          {
              'name': 'keycloak',
              'icon': 'fa-key',
              'token_key': 'access_token',
              'remote_app': {
                  'client_id': os.environ.get('OAUTH_CLIENT_ID', 'superset'),
                  'client_secret': os.environ.get('OAUTH_CLIENT_SECRET'),
                  'client_kwargs': {'scope': 'openid profile email roles'},
                  'server_metadata_url': os.environ.get('OAUTH_SERVER_METADATA_URL', ''),
              },
          }
      ]
      AUTH_USER_REGISTRATION = True
      AUTH_USER_REGISTRATION_ROLE = "Gamma"
      AUTH_ROLES_MAPPING = {
          'superset-admin': ['Admin'],
          'superset-user': ['Gamma'],
          'superset-public': ['Public'],
      }
      AUTH_ROLES_SYNC_AT_LOGIN = True
      AUTH_ROLE_ADMIN = 'Admin'
      AUTH_ROLE_PUBLIC = 'Public'

  # -- Reference the operator-created OIDC secret to inject OAuth env vars.
  extraEnvRaw:
    - name: OAUTH_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: superset-nebari-superset-oidc-client  # <release>-nebari-superset-oidc-client
          key: client-id
    - name: OAUTH_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: superset-nebari-superset-oidc-client
          key: client-secret
    - name: OAUTH_SERVER_METADATA_URL
      valueFrom:
        secretKeyRef:
          name: superset-nebari-superset-oidc-client
          key: issuer-url
          optional: true

  # -- Use external PostgreSQL for production
  postgresql:
    enabled: false
  redis:
    enabled: true

  # -- External database connection
  supersetNode:
    connections:
      db_host: your-postgres-host.example.com  # CHANGE ME
      db_port: "5432"
      db_user: superset
      db_pass: changeme  # CHANGE ME - use a secret in production
      db_name: superset

  bootstrapScript: |
    #!/bin/bash
    uv pip install authlib ".[postgres]" && \
    if [ ! -f ~/bootstrap ]; then echo "Running Superset with uid {{ .Values.runAsUser }}" > ~/bootstrap; fi

  service:
    type: ClusterIP
    port: 8088
