# examples/argocd-app.yaml
# Example ArgoCD Application for deploying nebari-superset on a Nebari cluster.
# Customize the hostname, namespace, and targetRevision for your environment.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: superset
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://nebari-dev.github.io/helm-repository
    chart: nebari-superset
    targetRevision: "0.1.0"
    helm:
      valueFiles: []
      values: |
        nebariapp:
          enabled: true
          hostname: superset.nebari.example.com
          routing:
            tls:
              enabled: true
            routes:
              - pathPrefix: /
                pathType: PathPrefix
          auth:
            enabled: true

        superset:
          configOverrides:
            oauth_config: |
              import os
              import logging
              from flask_appbuilder.security.manager import AUTH_OAUTH
              from superset.security import SupersetSecurityManager

              logger = logging.getLogger(__name__)

              class CustomSecurityManager(SupersetSecurityManager):
                  def oauth_user_info(self, provider, response=None):
                      if provider == 'keycloak':
                          me = self.appbuilder.sm.oauth_remotes[provider].userinfo()
                          roles = me.get('roles', me.get('groups', []))
                          logger.info(f"Keycloak userinfo: {me}")
                          return {
                              'username': me.get('preferred_username', ''),
                              'first_name': me.get('given_name', ''),
                              'last_name': me.get('family_name', ''),
                              'email': me.get('email', ''),
                              'role_keys': roles,
                          }
                      return super().oauth_user_info(provider, response)

              CUSTOM_SECURITY_MANAGER = CustomSecurityManager
              AUTH_TYPE = AUTH_OAUTH
              OAUTH_PROVIDERS = [
                  {
                      'name': 'keycloak',
                      'icon': 'fa-key',
                      'token_key': 'access_token',
                      'remote_app': {
                          'client_id': os.environ.get('OAUTH_CLIENT_ID', 'superset'),
                          'client_secret': os.environ.get('OAUTH_CLIENT_SECRET'),
                          'client_kwargs': {'scope': 'openid profile email roles'},
                          'server_metadata_url': os.environ.get('OAUTH_SERVER_METADATA_URL', ''),
                      },
                  }
              ]
              AUTH_USER_REGISTRATION = True
              AUTH_USER_REGISTRATION_ROLE = "Gamma"
              AUTH_ROLES_MAPPING = {
                  'superset-admin': ['Admin'],
                  'superset-user': ['Gamma'],
                  'superset-public': ['Public'],
              }
              AUTH_ROLES_SYNC_AT_LOGIN = True
              AUTH_ROLE_ADMIN = 'Admin'
              AUTH_ROLE_PUBLIC = 'Public'

          # Reference the operator-created OIDC secret for OAuth credentials.
          # Secret name follows the pattern: <release>-nebari-superset-oidc-client
          extraEnvRaw:
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: superset-nebari-superset-oidc-client
                  key: client-id
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: superset-nebari-superset-oidc-client
                  key: client-secret
            - name: OAUTH_SERVER_METADATA_URL
              valueFrom:
                secretKeyRef:
                  name: superset-nebari-superset-oidc-client
                  key: issuer-url
                  optional: true

          bootstrapScript: |
            #!/bin/bash
            uv pip install authlib ".[postgres]" && \
            if [ ! -f ~/bootstrap ]; then echo "Running Superset with uid {{ .Values.runAsUser }}" > ~/bootstrap; fi

  destination:
    server: https://kubernetes.default.svc
    namespace: superset
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
